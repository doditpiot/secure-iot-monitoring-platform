# Prometheus configuration
# Author: HAMAILI Ahmed-Imad

# Prometheus periodically scrapes the FastAPI backend metrics endpoint.
global:
  scrape_interval: 10s

scrape_configs:
  - job_name: secure-iot-backend
    metrics_path: /metrics
    static_configs:
      # Docker Compose DNS resolves `backend` to the FastAPI container.
      - targets: ["backend:8000"]

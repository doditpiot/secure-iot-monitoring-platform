# Nginx configuration for the Vue dashboard
# Author: HAMAILI Ahmed-Imad

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Vue is served as a single-page application, so unknown routes fallback to
  # index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}

# Mosquitto MQTT broker configuration
# Author: HAMAILI Ahmed-Imad

# The broker listens on the default MQTT port inside and outside Docker.
listener 1883

# Anonymous access is allowed only for the local demo. Device identity is still
# checked by the backend with device keys before telemetry is stored.
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

# Logs are sent to stdout so Docker can display them with `docker compose logs`.
log_dest stdout
